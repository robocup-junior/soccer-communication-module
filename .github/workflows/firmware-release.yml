name: Firmware Release

on:
  push:
    tags:
      - "fw-*"
      - "v*"

permissions:
  contents: read

concurrency:
  group: firmware-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build firmware and Pages site
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build ESP32-C5 firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.4
          target: esp32c5
          path: firmware/RCj_comm_module

      - name: Prepare release files
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.4
          target: esp32c5
          path: firmware/RCj_comm_module
          command: python ../../tools/prepare_firmware_release.py --project-dir . --web-src ../../web/flasher --output-dir ../../dist --version ${{ github.ref_name }}

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-release
          path: dist
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware-release
          path: dist

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          files=(
            dist/firmware/*
            dist/manifest.json
            dist/version.json
            dist/release-notes.md
          )

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${files[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${files[@]}" \
              --title "Firmware $TAG_NAME" \
              --notes-file dist/release-notes.md
          fi

  deploy-pages:
    name: Publish Web Flasher to gh-pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware-release
          path: dist

      - name: Push site to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd dist
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy firmware flasher for ${{ github.ref_name }}"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git push --force origin gh-pages
