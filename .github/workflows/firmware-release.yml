name: Firmware Release

on:
  push:
    tags:
      - "fw-*"
      - "v*"

permissions:
  contents: read

concurrency:
  group: firmware-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build firmware and Pages site
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build ESP32-C5 firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.4
          target: esp32c5
          path: firmware/RCj_comm_module

      - name: Prepare release files
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.4
          target: esp32c5
          path: firmware/RCj_comm_module
          command: python ../../tools/prepare_firmware_release.py --project-dir . --web-src ../../web/flasher --output-dir ../../dist --version ${{ github.ref_name }}

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-release
          path: dist
          if-no-files-found: error

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware-release
          path: dist

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          files=(
            dist/firmware/*
            dist/manifest.json
            dist/version.json
            dist/release-notes.md
          )

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${files[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${files[@]}" \
              --title "Firmware $TAG_NAME" \
              --notes-file dist/release-notes.md
          fi

  deploy-pages:
    name: Deploy Web Flasher
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
